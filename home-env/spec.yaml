openapi: 3.0.4
info:
  version: 0.0.1
  title: Home Environmentl API
  summary: This API returns the outdoor temperature and light level in my back yard.
  description: An API that allows for a client to retrieve a JSON representation of my outdoor environment
  license:
    name: GNU Lesser General Public License v3.0
    identifier: LGPL-3.0-only

servers:
  - url: http://apiserver:80

paths:
  /environment:
    get:
      summary: return the environment as a JSON object
      operationId: gethw
      responses:
        200:
          description: The outdoor environment
          content:
            application/json:
              schema:
                type: string

components:
  schemas:
    Error:
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
          description: Error code
        message:
          type: string
          description: Error message
